<div class="sidebar-header">
  <img src="assets/images/bank_image.png" class="avatar" />
</div>

<mat-nav-list class="sidenav-nav">
  @for (item of sideNavItems; track $index) {
    <li
      class="sidenav-nav-item"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      #rla="routerLinkActive"
      [class.active]="rla.isActive"
    >
      <a class="sidenav-nav-link" [routerLink]="item.routeLink">
        <mat-icon>{{ item.icon }}</mat-icon>
        <span class="sidenav-link-text">{{ item.label }}</span>
      </a>
    </li>
  }
</mat-nav-list>
