<div>
  <mat-form-field class="form-width">
    <mat-label>Enter Name</mat-label>
    <input type="text"
           placeholder="Name"
           matInput
           #nameInput>
  </mat-form-field>
</div>
<div>
  <mat-form-field class="form-width">
    <mat-label>Enter Account No</mat-label>
    <input type="text"
           placeholder="Account No"
           matInput
           #accountInput>
  </mat-form-field>
</div>
<div>
  <mat-form-field class="form-width">
    <mat-label>Enter Identification Id</mat-label>
    <input type="text"
           placeholder="Identification Id"
           matInput
           #idInput>
  </mat-form-field>
</div>
<button class="btn" (click)="openSnackBar()">
  Generate Voucher
</button>
