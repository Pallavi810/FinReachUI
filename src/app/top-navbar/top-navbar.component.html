<mat-toolbar color="primary" class="app-toolbar">
    @for (item of topNavItems; track $index) {
      <div class="sidenav-nav-item">
        <a
          class="sidenav-nav-link"
          [routerLink]="item.routeLink"
          routerLinkActive="active">
          <mat-icon  class="sidenav-link-icon" >{{ item.icon }}</mat-icon>
            <span class="sidenav-link-text">{{ item.label }}</span>
        </a>
      </div>
    }
<span class="spacer"></span>

<button mat-icon-button [matMenuTriggerFor]="langMenu">
  <mat-icon>language</mat-icon>
</button>

<mat-menu #langMenu="matMenu">
  <button mat-menu-item>English</button>
  <button mat-menu-item >हिन्दी</button>
  <button mat-menu-item (click)="changeLanguage('mr')">मराठी</button>
</mat-menu>

<button mat-icon-button [matMenuTriggerFor]="logoutMenu" >
  <mat-icon>account_circle</mat-icon>
</button>
<mat-menu #logoutMenu="matMenu">
  <button mat-menu-item (click)="logout()">Logout</button>
</mat-menu>
</mat-toolbar>
